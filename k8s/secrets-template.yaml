# =============================================================================
# !! 경고: 이 파일에 실제 시크릿 값을 절대 입력하지 마세요 !!
# !! WARNING: NEVER commit real secret values to this file or any YAML file !!
# =============================================================================
#
# 이 파일은 Secret 생성을 위한 템플릿/가이드입니다.
# 실제 Secret은 아래 kubectl 명령어를 사용하여 클러스터에 직접 생성하세요.
# .gitignore에 실제 시크릿 파일을 추가하거나, Vault/Sealed Secrets 사용을 권장합니다.
#
# 권장 보안 방법:
#   1. kubectl 명령어로 직접 생성 (아래 명령어 참고)
#   2. Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#   3. HashiCorp Vault + External Secrets Operator
#   4. AWS/GCP/Azure Secret Manager + External Secrets Operator
#
# =============================================================================
# Secret 생성 kubectl 명령어 (실제 값으로 교체 후 실행)
# =============================================================================

# 1. API 서비스 시크릿 (Groq AI API 키, 뉴스 API 키)
# kubectl create secret generic stock-api-secrets \
#   --namespace=stock \
#   --from-literal=GROQ_API_KEY='your-groq-api-key-here' \
#   --from-literal=NEWS_API_KEY='your-news-api-key-here'

# 2. 데이터베이스 시크릿 (TimescaleDB 접속 정보)
# kubectl create secret generic stock-db-secret \
#   --namespace=stock \
#   --from-literal=POSTGRES_USER='stock' \
#   --from-literal=POSTGRES_PASSWORD='your-secure-db-password-here' \
#   --from-literal=POSTGRES_DB='stockdb'

# 3. KIS(한국투자증권) API 시크릿
# kubectl create secret generic stock-kis-secret \
#   --namespace=stock \
#   --from-literal=KIS_APP_KEY='your-kis-app-key-here' \
#   --from-literal=KIS_APP_SECRET='your-kis-app-secret-here' \
#   --from-literal=KIS_MOCK='false'

# 4. 알림 서비스 시크릿 (Slack Webhook)
# kubectl create secret generic stock-notifier-secret \
#   --namespace=stock \
#   --from-literal=SLACK_WEBHOOK_URL='https://hooks.slack.com/services/your/webhook/url'

# 5. Harbor 이미지 레지스트리 Pull Secret
# kubectl create secret docker-registry harbor-pull-secret \
#   --namespace=stock \
#   --docker-server=10.0.2.105 \
#   --docker-username='your-harbor-username' \
#   --docker-password='your-harbor-password' \
#   --docker-email='your-email@example.com'

# =============================================================================
# Secret 확인 명령어
# =============================================================================
# kubectl get secrets -n stock
# kubectl describe secret stock-api-secrets -n stock
# kubectl describe secret stock-db-secret -n stock

