apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-collector
  namespace: stock
  labels:
    app: stock-collector
    app.kubernetes.io/name: stock-collector
    app.kubernetes.io/component: collector
    app.kubernetes.io/part-of: stock-platform
spec:
  # 주식 데이터 수집기는 단일 인스턴스로 실행 (중복 수집 방지)
  replicas: 1
  selector:
    matchLabels:
      app: stock-collector
  template:
    metadata:
      labels:
        app: stock-collector
        app.kubernetes.io/name: stock-collector
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-tier
                    operator: In
                    values:
                      - light

      # Harbor 프라이빗 레지스트리 인증
      imagePullSecrets:
        - name: harbor-pull-secret

      containers:
        - name: stock-collector
          # CI/CD 파이프라인에서 SHORT_SHA로 자동 업데이트됨
          image: 10.0.2.105/stock/stock-collector:4a59772
          imagePullPolicy: Always

          # ConfigMap에서 공통 환경변수 주입
          envFrom:
            - configMapRef:
                name: stock-config

          # ─────────────────────────────────────────────
          # 리소스 제한 설정
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ─────────────────────────────────────────────
          # 헬스체크 설정
          # ─────────────────────────────────────────────
          livenessProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
