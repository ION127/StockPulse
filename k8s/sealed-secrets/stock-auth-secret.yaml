# ── stock-auth-secret (Phase 6: JWT 인증) ────────────────────────────────
#
# 이 파일은 kubeseal로 암호화된 SealedSecret이어야 합니다.
# 아래 명령으로 생성하세요 (k8s 클러스터 접근 가능한 환경에서):
#
#   kubectl create secret generic stock-auth-secret \
#     --namespace stock \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --dry-run=client -o yaml \
#   | kubeseal \
#       --controller-namespace kube-system \
#       --controller-name sealed-secrets \
#       --format yaml \
#   > k8s/sealed-secrets/stock-auth-secret.yaml
#
# 생성 후 이 주석 블록을 삭제하고 커밋하세요.
# ─────────────────────────────────────────────────────────────────────────
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: stock-auth-secret
  namespace: stock
spec:
  encryptedData:
    JWT_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      creationTimestamp: null
      name: stock-auth-secret
      namespace: stock
