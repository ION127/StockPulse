apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier
  namespace: stock
  labels:
    app: notifier
    app.kubernetes.io/name: notifier
    app.kubernetes.io/component: notifier
    app.kubernetes.io/part-of: stock-platform
spec:
  # 알림 서비스는 단일 인스턴스로 실행 (중복 알림 방지)
  replicas: 1
  selector:
    matchLabels:
      app: notifier
  template:
    metadata:
      labels:
        app: notifier
        app.kubernetes.io/name: notifier
    spec:
      # Harbor 프라이빗 레지스트리 인증
      imagePullSecrets:
        - name: harbor-pull-secret

      containers:
        - name: notifier
          # CI/CD 파이프라인에서 SHORT_SHA로 자동 업데이트됨
          image: 10.0.2.105/stock/notifier:9644eb0
          imagePullPolicy: Always

          envFrom:
            # 공통 설정 (NOTIFY_EVENT_TYPES 포함)
            - configMapRef:
                name: stock-config
            # SLACK_WEBHOOK_URL 주입
            - secretRef:
                name: stock-notifier-secret

          # ─────────────────────────────────────────────
          # 리소스 제한 설정
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
