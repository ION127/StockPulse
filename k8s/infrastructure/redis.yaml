apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: stock
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: stock-platform
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: stock
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: stock-platform
spec:
  # Redis는 단일 인스턴스 (고가용성이 필요하면 Redis Sentinel 또는 Redis Cluster 사용)
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/name: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP

          # Redis 실행 명령 (AOF 영속성 활성화)
          command:
            - redis-server
            - "--appendonly"
            - "yes"
            - "--appendfsync"
            - "everysec"

          # ─────────────────────────────────────────────
          # 헬스체크
          # ─────────────────────────────────────────────
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # ─────────────────────────────────────────────
          # 리소스 제한 설정
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          emptyDir: {}
          # 영속성이 필요하면 아래 PVC로 교체
          # persistentVolumeClaim:
          #   claimName: redis-pvc
