apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: stock
  labels:
    app: zookeeper
    app.kubernetes.io/name: zookeeper
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: stock-platform
spec:
  type: ClusterIP
  selector:
    app: zookeeper
  ports:
    - name: client
      port: 2181
      targetPort: 2181
      protocol: TCP

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  namespace: stock
  labels:
    app: zookeeper
    app.kubernetes.io/name: zookeeper
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: stock-platform
spec:
  # 단일 ZooKeeper 인스턴스 (개발/스테이징 환경 간소화)
  # 프로덕션 환경에서는 3 또는 5로 설정 권장
  replicas: 1
  serviceName: zookeeper
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
        app.kubernetes.io/name: zookeeper
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-tier
                    operator: In
                    values:
                      - heavy

      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.0
          ports:
            - containerPort: 2181
              name: client
              protocol: TCP
            - containerPort: 2888
              name: follower
              protocol: TCP
            - containerPort: 3888
              name: election
              protocol: TCP

          env:
            # ZooKeeper 클라이언트 연결 포트
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            # ZooKeeper 기본 시간 단위 (ms), 세션 타임아웃 = 2 * tickTime
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
            # JVM 힙 크기 고정 (미설정 시 limit 기준으로 과도하게 설정됨)
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx256m -Xms128m"
            # 서버 ID: 단일 인스턴스이므로 고정값 1
            - name: ZOOKEEPER_SERVER_ID
              value: "1"

          # ─────────────────────────────────────────────
          # 헬스체크
          # ─────────────────────────────────────────────
          livenessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ─────────────────────────────────────────────
          # 리소스 제한 설정
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: zookeeper-data
              mountPath: /var/lib/zookeeper/data
            - name: zookeeper-log
              mountPath: /var/lib/zookeeper/log

  volumeClaimTemplates:
    - metadata:
        name: zookeeper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-stock
        resources:
          requests:
            storage: 5Gi
    - metadata:
        name: zookeeper-log
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-stock
        resources:
          requests:
            storage: 2Gi

---
# PostSync 훅: ArgoCD Sync 완료 후 zookeeper rolling restart 자동 실행
apiVersion: batch/v1
kind: Job
metadata:
  name: zookeeper-rollout-restart
  namespace: stock
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: argocd-rollout-restarter
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command:
            - kubectl
            - rollout
            - restart
            - statefulset/zookeeper
            - -n
            - stock
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
