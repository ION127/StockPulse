apiVersion: v1
kind: Service
metadata:
  # Headless Service: StatefulSet Pod 간 DNS 기반 직접 통신 지원
  # kafka-0.kafka-headless, kafka-1.kafka-headless, kafka-2.kafka-headless
  name: kafka-headless
  namespace: stock
  labels:
    app: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: stock-platform
spec:
  type: ClusterIP
  clusterIP: None  # Headless Service
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
      protocol: TCP

---

apiVersion: v1
kind: Service
metadata:
  # 클라이언트용 일반 서비스: 애플리케이션에서 kafka:9092로 접근
  name: kafka
  namespace: stock
  labels:
    app: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: stock-platform
spec:
  type: ClusterIP
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
      protocol: TCP

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: stock
  labels:
    app: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: stock-platform
spec:
  replicas: 3  # 3개 브로커로 고가용성 구성 (replication factor와 일치)
  serviceName: kafka-headless
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        app.kubernetes.io/name: kafka
    spec:
      # K8s가 'kafka' 서비스의 환경변수(KAFKA_PORT 등)를 자동 주입하면
      # Confluent 이미지가 이를 설정값으로 읽어 충돌 → 비활성화 필수
      enableServiceLinks: false
      # controlled shutdown이 완료되도록 충분한 종료 시간 부여
      # 기본 30s로는 Kafka controlled shutdown 완료 불가 → force delete 필요해짐
      terminationGracePeriodSeconds: 90

      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-tier
                    operator: In
                    values:
                      - heavy

      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
              name: broker
              protocol: TCP

          env:
            # Pod 이름을 환경변수로 가져오기 (kafka-0, kafka-1, kafka-2)
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            # Broker ID: Pod 호스트명 suffix에서 숫자 추출
            # kafka-0 → 0, kafka-1 → 1, kafka-2 → 2
            # KAFKA_BROKER_ID_COMMAND는 cp-kafka 이미지 공식 지원 방식 (K8s 버전 무관)
            - name: KAFKA_BROKER_ID_COMMAND
              value: "echo ${HOSTNAME##*-}"

            # JVM 힙 크기 고정 — 미설정 시 limit(2Gi) 기준으로 자동 설정되어
            # 브로커 3개 합산 최대 6Gi 소비 → 2코어 8GB 노드에서 OOMKill 위험
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx256m -Xms128m"

            # ZooKeeper 연결
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"

            # Advertised Listeners: StatefulSet DNS로 브로커 간 통신
            # $(POD_NAME)은 위에서 정의된 env var → K8s가 치환해줌
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://$(POD_NAME).kafka-headless.stock.svc.cluster.local:9092"

            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"

            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"

            # Offsets 토픽 복제 인수 (브로커 수와 일치시킴)
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "3"

            # 트랜잭션 로그 복제 인수
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "3"

            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "2"

            # 최대 메시지 크기: 10MB (대용량 주식 데이터 배치 처리 지원)
            - name: KAFKA_MESSAGE_MAX_BYTES
              value: "10485760"

            - name: KAFKA_REPLICA_FETCH_MAX_BYTES
              value: "10485760"

            # 로그 보관 기간: 7일 (시간 기준)
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
            # 로그 보관 용량: 브로커당 15Gi (20Gi PV 중 OS/오버헤드 5Gi 제외)
            - name: KAFKA_LOG_RETENTION_BYTES
              value: "16106127360"  # 15 * 1024^3
            # 로그 세그먼트 크기: 512MB (삭제 단위를 작게 유지)
            - name: KAFKA_LOG_SEGMENT_BYTES
              value: "536870912"

          # ─────────────────────────────────────────────
          # 헬스체크
          # ─────────────────────────────────────────────
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3

          # ─────────────────────────────────────────────
          # 리소스 제한 설정
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"  # 힙 256m + JVM 오버헤드 고려

          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data

  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-stock   # k8s/infrastructure/nfs-storage.yaml 에서 정의
        resources:
          requests:
            storage: 20Gi
