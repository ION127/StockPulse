apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-platform-dashboard
  namespace: stock
  labels:
    # Grafana sidecar가 이 레이블을 감지하여 대시보드 자동 로드
    grafana_dashboard: "1"
    app.kubernetes.io/name: stock-platform
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: stock-platform
data:
  stock-platform-dashboard.json: |
    {
      "__inputs": [],
      "__requires": [
        {
          "type": "grafana",
          "id": "grafana",
          "name": "Grafana",
          "version": "9.0.0"
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "주식 이상 탐지 플랫폼 종합 모니터링 대시보드",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Kafka 메트릭",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (consumergroup, topic) (kafka_consumergroup_lag{namespace=\"stock\"})",
              "legendFormat": "{{consumergroup}} - {{topic}}",
              "refId": "A"
            }
          ],
          "title": "Kafka Consumer Group Lag (컨슈머 그룹 지연)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never"
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (topic) (rate(kafka_topic_partition_current_offset{namespace=\"stock\"}[5m]))",
              "legendFormat": "{{topic}} 처리율",
              "refId": "A"
            }
          ],
          "title": "Kafka Topic 메시지 처리율 (msg/s)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 101,
          "title": "API 서버 메트릭",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never"
              },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "id": 3,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (method, handler) (rate(http_requests_total{job=\"stock-api\", status=~\"2..\"}[5m]))",
              "legendFormat": "{{method}} {{handler}} (2xx)",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (method, handler) (rate(http_requests_total{job=\"stock-api\", status=~\"5..\"}[5m]))",
              "legendFormat": "{{method}} {{handler}} (5xx)",
              "refId": "B"
            }
          ],
          "title": "API 요청 처리율 (Request Rate)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never"
              },
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "id": 4,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum by (le, handler) (rate(http_request_duration_seconds_bucket{job=\"stock-api\"}[5m])))",
              "legendFormat": "p50 {{handler}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum by (le, handler) (rate(http_request_duration_seconds_bucket{job=\"stock-api\"}[5m])))",
              "legendFormat": "p95 {{handler}}",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum by (le, handler) (rate(http_request_duration_seconds_bucket{job=\"stock-api\"}[5m])))",
              "legendFormat": "p99 {{handler}}",
              "refId": "C"
            }
          ],
          "title": "API 응답 시간 분포 (Latency Percentiles)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 102,
          "title": "이상 탐지 메트릭",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              },
              "unit": "short",
              "mappings": []
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 19 },
          "id": 5,
          "options": {
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "text": {}
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(anomaly_detected_total{job=\"stock-anomaly-detector\"}[1h]))",
              "legendFormat": "1시간 이상 탐지 수",
              "refId": "A"
            }
          ],
          "title": "이상 탐지 건수 (최근 1시간)",
          "type": "gauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "showPoints": "never"
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 19 },
          "id": 6,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (event_type) (increase(anomaly_detected_total{job=\"stock-anomaly-detector\"}[5m]))",
              "legendFormat": "{{event_type}}",
              "refId": "A"
            }
          ],
          "title": "이상 탐지 유형별 분포 (5분 단위)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 27 },
          "id": 103,
          "title": "노드 리소스 사용량 (node-exporter)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "percentunit",
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 28 },
          "id": 7,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "1 - avg by (node) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "{{node}} CPU",
              "refId": "A"
            }
          ],
          "title": "노드 CPU 사용률 (%)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "percentunit",
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.75 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 28 },
          "id": 8,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes",
              "legendFormat": "{{node}} 메모리",
              "refId": "A"
            }
          ],
          "title": "노드 메모리 사용률 (%)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 36 },
          "id": 104,
          "title": "Pod 리소스 사용량 (kube-state-metrics)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "showPoints": "never" },
              "unit": "percentunit",
              "max": 1,
              "min": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 37 },
          "id": 9,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"stock\", container!=\"\", container!=\"POD\"}[5m])) / sum by (pod) (kube_pod_container_resource_limits{namespace=\"stock\", resource=\"cpu\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Pod CPU 사용률 (limit 대비 %)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "showPoints": "never" },
              "unit": "percentunit",
              "max": 1,
              "min": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 37 },
          "id": 10,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"stock\", container!=\"\", container!=\"POD\"}) / sum by (pod) (kube_pod_container_resource_limits{namespace=\"stock\", resource=\"memory\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Pod 메모리 사용률 (limit 대비 %)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 45 },
          "id": 105,
          "title": "네트워크 & 디스크 I/O",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 5, "lineWidth": 1, "showPoints": "never" },
              "unit": "Bps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 46 },
          "id": 11,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(node_network_receive_bytes_total{device!~\"lo|veth.*|docker.*|flannel.*|cali.*\"}[5m])",
              "legendFormat": "{{node}} {{device}} 수신",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "-rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|docker.*|flannel.*|cali.*\"}[5m])",
              "legendFormat": "{{node}} {{device}} 송신",
              "refId": "B"
            }
          ],
          "title": "노드 네트워크 I/O (수신↑ / 송신↓)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 5, "lineWidth": 1, "showPoints": "never" },
              "unit": "Bps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 46 },
          "id": 12,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(node_disk_read_bytes_total[5m])",
              "legendFormat": "{{node}} {{device}} 읽기",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "-rate(node_disk_written_bytes_total[5m])",
              "legendFormat": "{{node}} {{device}} 쓰기",
              "refId": "B"
            }
          ],
          "title": "노드 디스크 I/O (읽기↑ / 쓰기↓)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["stock", "kafka", "anomaly", "k8s"],
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(kube_pod_info{namespace=\"stock\"}, pod)",
            "hide": 0,
            "includeAll": true,
            "label": "Pod",
            "multi": true,
            "name": "pod",
            "options": [],
            "query": {
              "query": "label_values(kube_pod_info{namespace=\"stock\"}, pod)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "Asia/Seoul",
      "title": "주식 이상 탐지 플랫폼 모니터링",
      "uid": "stock-platform-v1",
      "version": 1
    }
