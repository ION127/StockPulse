apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: stock-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.0.2.200/32  # 단일 외부 IP 고정
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: stock-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - stock-pool
