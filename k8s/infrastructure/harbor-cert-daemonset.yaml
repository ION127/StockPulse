---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: harbor-cert-installer
  namespace: stock
  labels:
    app: harbor-cert-installer
spec:
  selector:
    matchLabels:
      app: harbor-cert-installer
  template:
    metadata:
      labels:
        app: harbor-cert-installer
    spec:
      hostPID: true
      hostIPC: true
      tolerations:
        # control-plane 노드에도 적용
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: install-cert
          image: alpine:3.19
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              # containerd certs.d 디렉토리 생성
              mkdir -p /host/etc/containerd/certs.d/10.0.2.105

              # Harbor 인증서 복사
              cp /config/harbor.crt /host/etc/containerd/certs.d/10.0.2.105/ca.crt

              # hosts.toml 복사
              cp /config/hosts.toml /host/etc/containerd/certs.d/10.0.2.105/hosts.toml

              # containerd config.toml의 config_path 업데이트
              if grep -q "config_path = ''" /host/etc/containerd/config.toml; then
                sed -i "s|config_path = ''|config_path = '/etc/containerd/certs.d'|g" /host/etc/containerd/config.toml
                echo "containerd config_path updated"
              else
                echo "config_path already set"
              fi

              # containerd 재시작 (nsenter로 host PID namespace에서 실행)
              nsenter -t 1 -m -u -i -n -p -- systemctl restart containerd
              echo "containerd restarted"
          volumeMounts:
            - name: host-etc
              mountPath: /host/etc
            - name: cert-config
              mountPath: /config
      containers:
        - name: pause
          image: gcr.io/google-containers/pause:3.2
          resources:
            requests:
              cpu: "1m"
              memory: "8Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"
      volumes:
        - name: host-etc
          hostPath:
            path: /etc
        - name: cert-config
          configMap:
            name: harbor-cert-config
