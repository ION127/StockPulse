---
# ════════════════════════════════════════════════════════════════════════════
# NFS 기반 StorageClass + PersistentVolume 설정
#
# NFS 서버 초기 설정 (infra VM: 10.0.2.105) — 최초 1회만 실행:
#
#   sudo apt install -y nfs-kernel-server
#   sudo mkdir -p /data/nfs/{timescaledb,kafka-0,kafka-1,kafka-2,zookeeper-data,zookeeper-log,redis}
#   sudo chmod 777 /data/nfs/{timescaledb,kafka-0,kafka-1,kafka-2,zookeeper-data,zookeeper-log,redis}
#   echo "/data/nfs *(rw,sync,no_subtree_check,no_root_squash)" | sudo tee -a /etc/exports
#   sudo exportfs -ra
#   sudo systemctl enable --now nfs-kernel-server
#
# 각 K8s 노드에서 (최초 1회):
#   sudo apt install -y nfs-common
#
# PV-PVC 바인딩 원칙:
#   claimRef를 명시해 Kubernetes가 임의 바인딩하는 것을 방지
#
# mountOptions 설명:
#   noresvport  : 재연결 시 비예약 포트 사용 → force delete 후 마운트 복구 가능
#   vers=4.1    : NFS 버전 고정 (자동 협상 대신 명시적 지정으로 안정성 향상)
#   timeo=30    : NFS 응답 대기 시간 3초 (기본 600 = 60초보다 빠른 장애 감지)
#   retrans=3   : 재전송 횟수 (hard mount이므로 실제 포기하지 않고 재시도 반복)
# ════════════════════════════════════════════════════════════════════════════

# ── StorageClass ─────────────────────────────────────────────────────────────
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-stock
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: k8s-sigs.io/nfs-subdir-external-provisioner
parameters:
  server: "10.0.2.105"
  path: "/data/nfs"
  onDelete: retain
  archiveOnDelete: "false"
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
mountOptions:
  - noresvport
  - vers=4.1
  - timeo=30
  - retrans=3

---
# ── PV: TimescaleDB ──────────────────────────────────────────────────────────
# PVC: timescaledb-data-timescaledb-0 (StatefulSet 자동 생성)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-timescaledb
  labels:
    app: timescaledb
spec:
  capacity:
    storage: 80Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-stock
  mountOptions:
    - noresvport
    - vers=4.1
    - timeo=30
    - retrans=3
  claimRef:
    name: timescaledb-data-timescaledb-0
    namespace: stock
  nfs:
    server: "10.0.2.105"
    path: "/data/nfs/timescaledb"

---
# ── PV: Kafka 브로커 0 ───────────────────────────────────────────────────────
# PVC: kafka-data-kafka-0 (StatefulSet 자동 생성)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-kafka-0
  labels:
    app: kafka
    kafka-broker: "0"
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-stock
  mountOptions:
    - noresvport
    - vers=4.1
    - timeo=30
    - retrans=3
  claimRef:
    name: kafka-data-kafka-0
    namespace: stock
  nfs:
    server: "10.0.2.105"
    path: "/data/nfs/kafka-0"

---
# ── PV: Kafka 브로커 1 ───────────────────────────────────────────────────────
# PVC: kafka-data-kafka-1 (StatefulSet 자동 생성)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-kafka-1
  labels:
    app: kafka
    kafka-broker: "1"
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-stock
  mountOptions:
    - noresvport
    - vers=4.1
    - timeo=30
    - retrans=3
  claimRef:
    name: kafka-data-kafka-1
    namespace: stock
  nfs:
    server: "10.0.2.105"
    path: "/data/nfs/kafka-1"

---
# ── PV: Kafka 브로커 2 ───────────────────────────────────────────────────────
# PVC: kafka-data-kafka-2 (StatefulSet 자동 생성)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-kafka-2
  labels:
    app: kafka
    kafka-broker: "2"
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-stock
  mountOptions:
    - noresvport
    - vers=4.1
    - timeo=30
    - retrans=3
  claimRef:
    name: kafka-data-kafka-2
    namespace: stock
  nfs:
    server: "10.0.2.105"
    path: "/data/nfs/kafka-2"

---
# ── PV: Zookeeper 데이터 ─────────────────────────────────────────────────────
# PVC: zookeeper-data-zookeeper-0 (StatefulSet 자동 생성)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-zookeeper-data
  labels:
    app: zookeeper
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-stock
  mountOptions:
    - noresvport
    - vers=4.1
    - timeo=30
    - retrans=3
  claimRef:
    name: zookeeper-data-zookeeper-0
    namespace: stock
  nfs:
    server: "10.0.2.105"
    path: "/data/nfs/zookeeper-data"

---
# ── PV: Zookeeper 로그 ───────────────────────────────────────────────────────
# PVC: zookeeper-log-zookeeper-0 (StatefulSet 자동 생성)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-zookeeper-log
  labels:
    app: zookeeper
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-stock
  mountOptions:
    - noresvport
    - vers=4.1
    - timeo=30
    - retrans=3
  claimRef:
    name: zookeeper-log-zookeeper-0
    namespace: stock
  nfs:
    server: "10.0.2.105"
    path: "/data/nfs/zookeeper-log"

---
# ── PV: Redis ────────────────────────────────────────────────────────────────
# PVC: redis-pvc (아래에서 직접 정의)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-redis
  labels:
    app: redis
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-stock
  mountOptions:
    - noresvport
    - vers=4.1
    - timeo=30
    - retrans=3
  claimRef:
    name: redis-pvc
    namespace: stock
  nfs:
    server: "10.0.2.105"
    path: "/data/nfs/redis"

---
# ── PVC: Redis ───────────────────────────────────────────────────────────────
# Redis는 Deployment라 StatefulSet처럼 PVC를 자동 생성하지 않으므로 직접 정의
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: stock
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-stock
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: redis
