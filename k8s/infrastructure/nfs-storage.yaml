---
# ── PV: Zookeeper 로그 ───────────────────────────────────────────────────────
# PVC: zookeeper-log-zookeeper-0 (StatefulSet 자동 생성)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-zookeeper-log
  labels:
    app: zookeeper
spec:
  capacity:
