---
# ════════════════════════════════════════════════════════════════════════════
# NFS 기반 PersistentVolume 설정
#
# StorageClass/nfs-stock 은 argocd/nfs-provisioner.yaml (Helm 차트)이 관리합니다.
# 여기서 중복 정의 시 ArgoCD SharedResourceWarning + immutable 필드 SyncError 발생.
#
# NFS 서버 초기 설정 (infra VM: 10.0.2.105) — 최초 1회만 실행:
#
#   sudo apt install -y nfs-kernel-server
#   sudo mkdir -p /data/nfs/{timescaledb,kafka-0,kafka-1,kafka-2,zookeeper-data,zookeeper-log,redis}
#   sudo chmod 777 /data/nfs/{timescaledb,kafka-0,kafka-1,kafka-2,zookeeper-data,zookeeper-log,redis}
#   echo "/data/nfs *(rw,sync,no_subtree_check,no_root_squash)" | sudo tee -a /etc/exports
#   sudo exportfs -ra
#   sudo systemctl enable --now nfs-kernel-server
#
# 각 K8s 노드에서 (최초 1회):
#   sudo apt install -y nfs-common
#
# PV-PVC 바인딩 원칙:
#   claimRef를 명시해 Kubernetes가 임의 바인딩하는 것을 방지
# ════════════════════════════════════════════════════════════════════════════

# ── PV: TimescaleDB ──────────────────────────────────────────────────────────
# PVC: timescaledb-data-timescaledb-0 (StatefulSet 자동 생성)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-timescaledb
  labels:
    app: timescaledb
spec:
  capacity:
    storage: 80Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-stock
  claimRef:
    name: timescaledb-data-timescaledb-0
    namespace: stock
  nfs:
    server: "10.0.2.105"
    path: "/data/nfs/timescaledb"

---
# ── PV: Kafka 브로커 0 ───────────────────────────────────────────────────────
# PVC: kafka-data-kafka-0 (StatefulSet 자동 생성)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-kafka-0
  labels:
    app: kafka
    kafka-broker: "0"
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-stock
  claimRef:
    name: kafka-data-kafka-0
    namespace: stock
  nfs:
    server: "10.0.2.105"
    path: "/data/nfs/kafka-0"

---
# ── PV: Kafka 브로커 1 ───────────────────────────────────────────────────────
# PVC: kafka-data-kafka-1 (StatefulSet 자동 생성)
apiVersion: v1
