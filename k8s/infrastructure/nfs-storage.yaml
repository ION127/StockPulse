---
# ── PV: Redis ────────────────────────────────────────────────────────────────
# PVC: redis-pvc (아래에서 직접 정의)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-redis
  labels:
    app: redis
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-stock
  claimRef:
    name: redis-pvc
    namespace: stock
  nfs:
    server: "10.0.2.105"
    path: "/data/nfs/redis"

---
# ── PVC: Redis ───────────────────────────────────────────────────────────────
# Redis는 Deployment라 StatefulSet처럼 PVC를 자동 생성하지 않으므로 직접 정의
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: stock
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-stock
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: redis
