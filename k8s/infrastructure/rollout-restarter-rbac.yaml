---
# ArgoCD PostSync 훅용 ServiceAccount + RBAC
# StatefulSet/Deployment rollout restart 권한 부여

apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-rollout-restarter
  namespace: stock

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-rollout-restarter
  namespace: stock
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["get", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-rollout-restarter
  namespace: stock
subjects:
  - kind: ServiceAccount
    name: argocd-rollout-restarter
    namespace: stock
roleRef:
  kind: Role
  name: argocd-rollout-restarter
  apiGroup: rbac.authorization.k8s.io
