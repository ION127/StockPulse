apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: stock
  labels:
    app: api
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: stock-platform
spec:
  # WebSocketManager가 인메모리 연결 목록 관리 → replicas > 1 이면
  # 다른 Pod가 수신한 Kafka 메시지의 WS 브로드캐스트가 유실됨
  # Redis pub/sub 도입 전까지 단일 인스턴스 유지
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        app.kubernetes.io/name: api
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-tier
                    operator: In
                    values:
                      - heavy

      # Harbor 프라이빗 레지스트리 인증
      imagePullSecrets:
        - name: harbor-pull-secret

      # TimescaleDB가 완전히 준비될 때까지 API 컨테이너 시작 차단
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              echo "TimescaleDB 준비 대기 중..."
              until pg_isready -h timescaledb-service -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "DB 아직 준비 안 됨, 3초 후 재시도..."
                sleep 3
              done
              echo "DB 준비 완료!"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: stock-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: stock-db-secret
                  key: POSTGRES_DB

      containers:
        - name: api
          # CI/CD 파이프라인에서 SHORT_SHA로 자동 업데이트됨
          image: 10.0.2.105/stock/api:d6f7f59
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          env:
            # ─────────────────────────────────────────────
            # DB 비밀번호를 Secret에서 먼저 주입
            # → DATABASE_URL 구성에 $(POSTGRES_PASSWORD) 참조 가능
            # ─────────────────────────────────────────────
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stock-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: stock-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: stock-db-secret
                  key: POSTGRES_DB

            # K8s 환경변수 치환 기능으로 DATABASE_URL 동적 구성
            # $(VAR_NAME) 형태로 앞서 정의된 env 변수를 참조 가능
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@timescaledb-service:5432/$(POSTGRES_DB)"

          # ConfigMap에서 공통 환경변수 주입
          envFrom:
            - configMapRef:
                name: stock-config
            - secretRef:
                name: stock-api-secrets  # GEMINI_API_KEY, NEWS_API_KEY
            - secretRef:
                name: stock-kis-secret   # KIS_APP_KEY, KIS_APP_SECRET, KIS_MOCK
            - secretRef:
                name: stock-auth-secret  # JWT_SECRET

          # ─────────────────────────────────────────────
          # 헬스체크 설정
          # ─────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ─────────────────────────────────────────────
          # 리소스 제한 설정
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
