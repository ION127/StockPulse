apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: stock
  labels:
    app: api
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: stock-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        app.kubernetes.io/name: api
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-tier
                    operator: In
                    values:
                      - heavy

      # Harbor 프라이빗 레지스트리 인증
      imagePullSecrets:
        - name: harbor-pull-secret

      containers:
        - name: api
          # CI/CD 파이프라인에서 SHORT_SHA로 자동 업데이트됨
          image: 10.0.2.105/stock/api:7086388
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          env:
            # ─────────────────────────────────────────────
            # DB 비밀번호를 Secret에서 먼저 주입
            # → DATABASE_URL 구성에 $(POSTGRES_PASSWORD) 참조 가능
            # ─────────────────────────────────────────────
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stock-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: stock-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: stock-db-secret
                  key: POSTGRES_DB

            # K8s 환경변수 치환 기능으로 DATABASE_URL 동적 구성
            # $(VAR_NAME) 형태로 앞서 정의된 env 변수를 참조 가능
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@timescaledb-service:5432/$(POSTGRES_DB)"

          # ConfigMap에서 공통 환경변수 주입
          envFrom:
            - configMapRef:
                name: stock-config
            - secretRef:
                name: stock-api-secrets  # GEMINI_API_KEY, NEWS_API_KEY

          # ─────────────────────────────────────────────
          # 헬스체크 설정
          # ─────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ─────────────────────────────────────────────
          # 리소스 제한 설정
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
