apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: stock
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: stock-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: frontend
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-tier
                    operator: In
                    values:
                      - light

      # Harbor 프라이빗 레지스트리 인증
      imagePullSecrets:
        - name: harbor-pull-secret

      containers:
        - name: frontend
          # CI/CD 파이프라인에서 SHORT_SHA로 자동 업데이트됨
          image: 10.0.2.105/stock/frontend:d9b2110
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP

          # ─────────────────────────────────────────────
          # 헬스체크 설정
          # ─────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ─────────────────────────────────────────────
          # 리소스 제한 설정
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
