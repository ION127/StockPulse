apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
  namespace: stock
  labels:
    app: anomaly-detector
    app.kubernetes.io/name: anomaly-detector
    app.kubernetes.io/component: detector
    app.kubernetes.io/part-of: stock-platform
spec:
  # 이상 탐지 워커는 Kafka 파티션 병렬 처리를 위해 2개 운영
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-detector
  template:
    metadata:
      labels:
        app: anomaly-detector
        app.kubernetes.io/name: anomaly-detector
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-tier
                    operator: In
                    values:
                      - light

      # Harbor 프라이빗 레지스트리 인증
      imagePullSecrets:
        - name: harbor-pull-secret

      containers:
        - name: anomaly-detector
          # CI/CD 파이프라인에서 SHORT_SHA로 자동 업데이트됨
          image: 10.0.2.105/stock/anomaly-detector:b7d3c3e
          imagePullPolicy: Always

          # ConfigMap에서 공통 환경변수 주입 (임계값 설정 포함)
          envFrom:
            - configMapRef:
                name: stock-config

          # ─────────────────────────────────────────────
          # 리소스 제한 설정 (이상 탐지 연산으로 CPU 사용 높음)
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
