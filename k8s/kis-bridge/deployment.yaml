apiVersion: apps/v1
kind: Deployment
metadata:
  name: kis-bridge
  namespace: stock
  labels:
    app: kis-bridge
    app.kubernetes.io/name: kis-bridge
    app.kubernetes.io/component: bridge
    app.kubernetes.io/part-of: stock-platform
spec:
  # KIS(한국투자증권) API 브리지는 단일 인스턴스로 실행 (API 호출 중복 방지)
  replicas: 1
  selector:
    matchLabels:
      app: kis-bridge
  template:
    metadata:
      labels:
        app: kis-bridge
        app.kubernetes.io/name: kis-bridge
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-tier
                    operator: In
                    values:
                      - light

      # Harbor 프라이빗 레지스트리 인증
      imagePullSecrets:
        - name: harbor-pull-secret

      containers:
        - name: kis-bridge
          # CI/CD 파이프라인에서 SHORT_SHA로 자동 업데이트됨
          image: 10.0.2.105/stock/kis-bridge:8061552
          imagePullPolicy: Always

          envFrom:
            # 공통 설정 (Kafka, Redis 등)
            - configMapRef:
                name: stock-config
            # KIS API 인증 정보 (KIS_APP_KEY, KIS_APP_SECRET, KIS_MOCK)
            - secretRef:
                name: stock-kis-secret

          # ─────────────────────────────────────────────
          # 헬스체크 설정
          # ─────────────────────────────────────────────
          livenessProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # ─────────────────────────────────────────────
          # 리소스 제한 설정
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
