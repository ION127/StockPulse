apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analyzer
  namespace: stock
  labels:
    app: ai-analyzer
    app.kubernetes.io/name: ai-analyzer
    app.kubernetes.io/component: analyzer
    app.kubernetes.io/part-of: stock-platform
spec:
  # AI 분석기는 2개 인스턴스로 운영 (Gemini API 병렬 호출)
  replicas: 2
  selector:
    matchLabels:
      app: ai-analyzer
  template:
    metadata:
      labels:
        app: ai-analyzer
        app.kubernetes.io/name: ai-analyzer
    spec:
      # Harbor 프라이빗 레지스트리 인증
      imagePullSecrets:
        - name: harbor-pull-secret

      containers:
        - name: ai-analyzer
          # CI/CD 파이프라인에서 SHORT_SHA로 자동 업데이트됨
          image: harbor.local/stock/ai-analyzer:latest
          imagePullPolicy: Always

          envFrom:
            # 공통 설정
            - configMapRef:
                name: stock-config
            # GEMINI_API_KEY 주입 (stock-api-secrets에 포함)
            - secretRef:
                name: stock-api-secrets

          # ─────────────────────────────────────────────
          # 리소스 제한 설정 (AI API 호출로 메모리 사용 높음)
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
