---
# ════════════════════════════════════════════════════════════════════════════
# ML 트레이너 CronJob
#
# 실행 스케줄:
#   - 일간 학습/예측  : 매일 17:30 KST (장 마감 30분 후)
#   - 주간 재학습     : 매주 토요일 01:00 KST (Optuna 포함 풀 재학습)
#   - 예측 검증       : 매일 09:10 KST (전일 예측 vs 실제 비교)
#
# 필요 시크릿/컨피그:
#   - stock-db-secret    : POSTGRES_*
#   - stock-api-secrets  : GROQ_API_KEY, DART_API_KEY, BOK_API_KEY
#   - stock-config       : 공통 환경변수
#
# 모델 파일 저장소:
#   - NFS PVC (ml-models-pvc) → /app/models
#   - 종목별 .joblib 파일 (lgb, xgb, cat 각각)
# ════════════════════════════════════════════════════════════════════════════

# ── PersistentVolumeClaim: 모델 파일 영구 저장 ────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  namespace: stock
  labels:
    app: ml-trainer
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of: stock-platform
spec:
  accessModes:
    - ReadWriteMany   # 학습 Job과 예측 Job이 동시 접근 가능
  storageClassName: nfs-stock
  resources:
    requests:
      storage: 5Gi

---
# ── 1. 일간 학습 + 예측 CronJob ────────────────────────────────────────────
# 매일 17:30 KST(08:30 UTC) 실행
# - 장 마감(15:30) 후 충분한 데이터 수집 대기
# - 전체 추적 종목 피처 수집 → 필요시 재학습 → 예측 → DB 저장

apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-trainer-daily
  namespace: stock
  labels:
    app: ml-trainer
    app.kubernetes.io/name: ml-trainer
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of: stock-platform
spec:
  # 매일 17:30 KST = 08:30 UTC
  schedule: "30 8 * * 1-5"    # 주중(월~금)만 실행
  timeZone: "Asia/Seoul"
  # 이전 Job이 아직 실행 중이면 건너뜀 (학습 시간이 길 수 있음)
  concurrencyPolicy: Forbid
  # 완료 1개, 실패 3개 보존
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # 네트워크 장애 등 일시적 오류에 대비한 재시도
      backoffLimit: 2
      # 최대 2시간 안에 완료 (전체 종목 학습+예측)
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app: ml-trainer
            job-type: daily
        spec:
          restartPolicy: OnFailure

          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: node-tier
                        operator: In
                        values:
                          - heavy

          # Harbor 프라이빗 레지스트리 인증
          imagePullSecrets:
            - name: harbor-pull-secret

          # TimescaleDB 준비 대기
          initContainers:
            - name: wait-for-db
              image: postgres:15-alpine
              command:
                - sh
                - -c
                - |
                  echo "TimescaleDB 준비 대기 중..."
                  until pg_isready -h timescaledb-service -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                    echo "DB 아직 준비 안 됨, 5초 후 재시도..."
                    sleep 5
                  done
                  echo "DB 준비 완료!"
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_DB

          containers:
            - name: ml-trainer
              # CI/CD 파이프라인에서 SHORT_SHA로 자동 업데이트됨
              image: 10.0.2.105/stock/ml-trainer:3bcedc8
              imagePullPolicy: Always

              env:
                # ── DB 연결 ─────────────────────────────────────────────
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_DB
                - name: DATABASE_URL
                  value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@timescaledb-service:5432/$(POSTGRES_DB)"

                # ── ML 설정 ─────────────────────────────────────────────
                - name: MODEL_DIR
                  value: "/app/models"
                # 재학습 트리거 정확도 임계값 (기본 52%)
                - name: ML_RETRAIN_THRESHOLD
                  value: "0.52"
                # 학습 데이터 기간 (1년)
                - name: ML_DAYS_BACK
                  value: "365"
                # 실행 모드: daily=일간예측, weekly=풀재학습, verify=검증
                - name: ML_RUN_MODE
                  value: "daily"

              # ConfigMap + Secret 환경변수
              envFrom:
                - configMapRef:
                    name: stock-config
                - secretRef:
                    name: stock-api-secrets  # GROQ_API_KEY

              volumeMounts:
                - name: models
                  mountPath: /app/models

              resources:
                requests:
                  cpu: "500m"
                  memory: "2Gi"
                limits:
                  cpu: "2000m"
                  memory: "4Gi"

          volumes:
            - name: models
              persistentVolumeClaim:
                claimName: ml-models-pvc

---
# ── 2. 주간 풀 재학습 CronJob ─────────────────────────────────────────────
# 매주 토요일 01:00 KST(금요일 16:00 UTC) 실행
# - Optuna 하이퍼파라미터 튜닝 포함 (n_trials=30, 시간이 더 걸림)
# - Walk-forward 검증으로 실제 성능 측정
# - 최근 2년치 데이터로 앙상블 재학습

apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-trainer-weekly
  namespace: stock
  labels:
    app: ml-trainer
    app.kubernetes.io/name: ml-trainer
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of: stock-platform
spec:
  # 매주 토요일 01:00 KST = 금요일 16:00 UTC
  schedule: "0 16 * * 5"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      # 최대 6시간 (Optuna 튜닝 포함)
      activeDeadlineSeconds: 21600
      template:
        metadata:
          labels:
            app: ml-trainer
            job-type: weekly
        spec:
          restartPolicy: OnFailure

          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: node-tier
                        operator: In
                        values:
                          - heavy

          imagePullSecrets:
            - name: harbor-pull-secret

          initContainers:
            - name: wait-for-db
              image: postgres:15-alpine
              command:
                - sh
                - -c
                - |
                  until pg_isready -h timescaledb-service -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                    sleep 5
                  done
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_DB

          containers:
            - name: ml-trainer
              image: 10.0.2.105/stock/ml-trainer:3bcedc8
              imagePullPolicy: Always

              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_DB
                - name: DATABASE_URL
                  value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@timescaledb-service:5432/$(POSTGRES_DB)"

                - name: MODEL_DIR
                  value: "/app/models"
                - name: ML_RETRAIN_THRESHOLD
                  value: "0.52"
                # 풀 재학습: 2년 데이터
                - name: ML_DAYS_BACK
                  value: "730"
                # 주간 모드: Optuna 튜닝 + Walk-forward 검증 포함
                - name: ML_RUN_MODE
                  value: "weekly"

              envFrom:
                - configMapRef:
                    name: stock-config
                - secretRef:
                    name: stock-api-secrets

              volumeMounts:
                - name: models
                  mountPath: /app/models

              # 주간 재학습은 자원 더 많이 사용
              resources:
                requests:
                  cpu: "1000m"
                  memory: "4Gi"
                limits:
                  cpu: "4000m"
                  memory: "8Gi"

          volumes:
            - name: models
              persistentVolumeClaim:
                claimName: ml-models-pvc

---
# ── 3. 예측 검증 CronJob ─────────────────────────────────────────────────
# 매일 09:10 KST(00:10 UTC) 실행
# - 전일 예측 결과와 실제 장 마감 가격 비교
# - was_correct 업데이트
# - 정확도 기록 → 임계값 이하면 재학습 플래그 설정

apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-predictor-verify
  namespace: stock
  labels:
    app: ml-trainer
    app.kubernetes.io/name: ml-trainer
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of: stock-platform
spec:
  # 매일 09:10 KST = 00:10 UTC (장 시작 전 전일 결과 검증)
  schedule: "10 0 * * 2-6"    # 화~토 (전날이 거래일인 경우만)
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800   # 30분 이내 완료
      template:
        metadata:
          labels:
            app: ml-trainer
            job-type: verify
        spec:
          restartPolicy: OnFailure

          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: node-tier
                        operator: In
                        values:
                          - heavy

          imagePullSecrets:
            - name: harbor-pull-secret

          initContainers:
            - name: wait-for-db
              image: postgres:15-alpine
              command:
                - sh
                - -c
                - |
                  until pg_isready -h timescaledb-service -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                    sleep 5
                  done
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_DB

          containers:
            - name: ml-trainer
              image: 10.0.2.105/stock/ml-trainer:3bcedc8
              imagePullPolicy: Always

              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: stock-db-secret
                      key: POSTGRES_DB
                - name: DATABASE_URL
                  value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@timescaledb-service:5432/$(POSTGRES_DB)"

                - name: MODEL_DIR
                  value: "/app/models"
                - name: ML_RETRAIN_THRESHOLD
                  value: "0.52"
                # 검증 모드: 전일 예측 결과만 확인
                - name: ML_RUN_MODE
                  value: "verify"

              envFrom:
                - configMapRef:
                    name: stock-config
                - secretRef:
                    name: stock-api-secrets

              volumeMounts:
                - name: models
                  mountPath: /app/models

              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"

          volumes:
            - name: models
              persistentVolumeClaim:
                claimName: ml-models-pvc
