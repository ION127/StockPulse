apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-fetcher
  namespace: stock
  labels:
    app: news-fetcher
    app.kubernetes.io/name: news-fetcher
    app.kubernetes.io/component: fetcher
    app.kubernetes.io/part-of: stock-platform
spec:
  # 뉴스 수집기는 2개 인스턴스로 운영 (고가용성)
  replicas: 2
  selector:
    matchLabels:
      app: news-fetcher
  template:
    metadata:
      labels:
        app: news-fetcher
        app.kubernetes.io/name: news-fetcher
    spec:
      # Harbor 프라이빗 레지스트리 인증
      imagePullSecrets:
        - name: harbor-pull-secret

      containers:
        - name: news-fetcher
          # CI/CD 파이프라인에서 SHORT_SHA로 자동 업데이트됨
          image: harbor.local/stock/news-fetcher:latest
          imagePullPolicy: Always

          envFrom:
            # 공통 설정
            - configMapRef:
                name: stock-config
            # NEWS_API_KEY 주입 (stock-api-secrets에 포함)
            - secretRef:
                name: stock-api-secrets

          # ─────────────────────────────────────────────
          # 리소스 제한 설정
          # ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
