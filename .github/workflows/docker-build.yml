name: Docker Build and Push to Harbor

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'
      - '*.md'
  workflow_dispatch:  # 수동 실행 시 모든 서비스 빌드

jobs:
  # ── 1단계: 변경된 서비스 감지 ────────────────────────────────────────────────
  detect-changes:
    runs-on: self-hosted
    outputs:
      api:              ${{ steps.check.outputs.api }}
      stock_collector:  ${{ steps.check.outputs.stock_collector }}
      kis_bridge:       ${{ steps.check.outputs.kis_bridge }}
      anomaly_detector: ${{ steps.check.outputs.anomaly_detector }}
      news_fetcher:     ${{ steps.check.outputs.news_fetcher }}
      ai_analyzer:      ${{ steps.check.outputs.ai_analyzer }}
      notifier:         ${{ steps.check.outputs.notifier }}
      frontend:         ${{ steps.check.outputs.frontend }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: check
        run: |
          # ── 수동 트리거: 모든 서비스 빌드 ──────────────────────────────────
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "수동 트리거 → 전체 빌드"
            for svc in api stock_collector kis_bridge anomaly_detector news_fetcher ai_analyzer notifier frontend; do
              echo "${svc}=true" >> $GITHUB_OUTPUT
            done
            exit 0
          fi

          # ── Push 이벤트: 변경 파일 감지 ─────────────────────────────────────
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            CHANGED=$(git show --name-only --format="" HEAD)
          else
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          fi

          echo "=== 변경된 파일 ==="
          echo "$CHANGED"
          echo "==================="

          # 패턴 매칭 함수
          has_change() {
            for pattern in "$@"; do
              echo "$CHANGED" | grep -qE "$pattern" && return 0
            done
            return 1
          }

          # 서비스별 변경 감지 함수
          check_service() {
            local service=$1
            shift
            if has_change "$@"; then
              echo "${service}=true" >> $GITHUB_OUTPUT
              echo "  ✓ ${service} 빌드 예정"
            else
              echo "${service}=false" >> $GITHUB_OUTPUT
              echo "  - ${service} 스킵"
            fi
          }

          echo "=== 빌드 대상 서비스 ==="

          # ── core 파일 → 의존 서비스 매핑 ──────────────────────────────────
          # core/ai_analyzer.py     → api, ai-analyzer
          # core/news_fetcher.py    → api, news-fetcher
          # core/stock_fetcher.py   → api, stock-collector, anomaly-detector
          # core/stock_categories.py→ api, stock-collector, anomaly-detector, news-fetcher, ai-analyzer
          # db/, schemas/           → api 전용
          # requirements.txt        → 변경된 패키지를 쓰는 서비스만 (전체 안전하게 포함)

          check_service "api"              \
            "^services/api/"               \
            "^core/"                       \
            "^db/"                         \
            "^schemas/"                    \
            "^requirements\.txt$"

          check_service "stock_collector"  \
            "^services/stock-collector/"   \
            "^core/stock_fetcher\.py"      \
            "^core/stock_categories\.py"   \
            "^requirements\.txt$"

          check_service "kis_bridge"       \
            "^services/kis-bridge/"

          check_service "anomaly_detector" \
            "^services/anomaly-detector/"  \
            "^core/stock_fetcher\.py"      \
            "^core/stock_categories\.py"   \
            "^requirements\.txt$"

          check_service "news_fetcher"     \
            "^services/news-fetcher/"      \
            "^core/news_fetcher\.py"       \
            "^core/stock_categories\.py"   \
            "^requirements\.txt$"

          check_service "ai_analyzer"      \
            "^services/ai-analyzer/"       \
            "^core/ai_analyzer\.py"        \
            "^requirements\.txt$"

          check_service "notifier"         \
            "^services/notifier/"          \
            "^core/stock_categories\.py"   \
            "^requirements\.txt$"

          check_service "frontend"         \
            "^frontend/"

  # ── 2단계: 변경된 서비스만 빌드 & 푸시 ──────────────────────────────────────
  build-and-push:
    needs: detect-changes
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Log in to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      # ─────────────────────────────────────────────
      # 백엔드 서비스 (build context: root)
      # ─────────────────────────────────────────────

      - name: Build and push api
        if: needs.detect-changes.outputs.api == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/stock/api:${{ env.SHORT_SHA }}
            ${{ secrets.HARBOR_URL }}/stock/api:latest

      - name: Build and push stock-collector
        if: needs.detect-changes.outputs.stock_collector == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/stock-collector/Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/stock/stock-collector:${{ env.SHORT_SHA }}
            ${{ secrets.HARBOR_URL }}/stock/stock-collector:latest

      - name: Build and push kis-bridge
        if: needs.detect-changes.outputs.kis_bridge == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/kis-bridge/Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/stock/kis-bridge:${{ env.SHORT_SHA }}
            ${{ secrets.HARBOR_URL }}/stock/kis-bridge:latest

      - name: Build and push anomaly-detector
        if: needs.detect-changes.outputs.anomaly_detector == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/anomaly-detector/Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/stock/anomaly-detector:${{ env.SHORT_SHA }}
            ${{ secrets.HARBOR_URL }}/stock/anomaly-detector:latest

      - name: Build and push news-fetcher
        if: needs.detect-changes.outputs.news_fetcher == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/news-fetcher/Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/stock/news-fetcher:${{ env.SHORT_SHA }}
            ${{ secrets.HARBOR_URL }}/stock/news-fetcher:latest

      - name: Build and push ai-analyzer
        if: needs.detect-changes.outputs.ai_analyzer == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/ai-analyzer/Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/stock/ai-analyzer:${{ env.SHORT_SHA }}
            ${{ secrets.HARBOR_URL }}/stock/ai-analyzer:latest

      - name: Build and push notifier
        if: needs.detect-changes.outputs.notifier == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/notifier/Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/stock/notifier:${{ env.SHORT_SHA }}
            ${{ secrets.HARBOR_URL }}/stock/notifier:latest

      # ─────────────────────────────────────────────
      # 프론트엔드 (build context: ./frontend)
      # ─────────────────────────────────────────────

      - name: Build and push frontend
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/stock/frontend:${{ env.SHORT_SHA }}
            ${{ secrets.HARBOR_URL }}/stock/frontend:latest

      # ─────────────────────────────────────────────
      # 변경된 서비스의 K8s 매니페스트만 업데이트
      # ─────────────────────────────────────────────

      - name: Update K8s manifests for changed services
        run: |
          HARBOR="${{ secrets.HARBOR_URL }}"

          update_manifest() {
            local SERVICE_DIR=$1   # 디렉토리 이름 (하이픈 포함)
            local MANIFEST="k8s/${SERVICE_DIR}/deployment.yaml"
            if [ -f "$MANIFEST" ]; then
              sed -i "s|${HARBOR}/stock/${SERVICE_DIR}:[^ ]*|${HARBOR}/stock/${SERVICE_DIR}:${SHORT_SHA}|g" "$MANIFEST"
              echo "  ✓ ${MANIFEST} → ${SHORT_SHA}"
            fi
          }

          echo "=== K8s 매니페스트 업데이트 ==="
          if [ "${{ needs.detect-changes.outputs.api }}"              = "true" ]; then update_manifest "api";              fi
          if [ "${{ needs.detect-changes.outputs.stock_collector }}"  = "true" ]; then update_manifest "stock-collector";  fi
          if [ "${{ needs.detect-changes.outputs.kis_bridge }}"       = "true" ]; then update_manifest "kis-bridge";       fi
          if [ "${{ needs.detect-changes.outputs.anomaly_detector }}" = "true" ]; then update_manifest "anomaly-detector"; fi
          if [ "${{ needs.detect-changes.outputs.news_fetcher }}"     = "true" ]; then update_manifest "news-fetcher";     fi
          if [ "${{ needs.detect-changes.outputs.ai_analyzer }}"      = "true" ]; then update_manifest "ai-analyzer";      fi
          if [ "${{ needs.detect-changes.outputs.notifier }}"         = "true" ]; then update_manifest "notifier";         fi
          if [ "${{ needs.detect-changes.outputs.frontend }}"         = "true" ]; then update_manifest "frontend";         fi

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet k8s/; then
            echo "변경된 매니페스트 없음 (스킵)"
          else
            git add k8s/
            git commit -m "ci: update image tags to ${SHORT_SHA} [skip ci]"
            git stash
            git pull --rebase origin main
            git stash pop || true
            git push
          fi
