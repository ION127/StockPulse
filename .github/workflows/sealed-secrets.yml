name: Generate Sealed Secrets

on:
  workflow_dispatch:  # 수동 실행 (Secret 추가/변경 시)

jobs:
  generate:
    runs-on: self-hosted  # kubeseal이 클러스터에 접근해야 하므로 self-hosted

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeseal
        run: |
          if ! command -v kubeseal &> /dev/null; then
            wget -q https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.26.0/kubeseal-0.26.0-linux-amd64.tar.gz
            tar xzvf kubeseal-0.26.0-linux-amd64.tar.gz
            sudo mv kubeseal /usr/local/bin/
            rm -f kubeseal-0.26.0-linux-amd64.tar.gz
          fi
          kubeseal --version

      - name: Create .env from GitHub Secrets
        run: |
          cat > .env <<EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}
          KIS_MOCK=${{ secrets.KIS_MOCK }}
          HARBOR_URL=${{ secrets.HARBOR_URL }}
          HARBOR_USER=${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD=${{ secrets.HARBOR_PASSWORD }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          EOF

      - name: Generate Sealed Secrets
        run: bash scripts/generate-sealed-secrets.sh

      - name: Cleanup .env
        if: always()
        run: rm -f .env

      - name: Commit and push sealed secrets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet k8s/sealed-secrets/; then
            echo "No changes to sealed secrets"
          else
            git add k8s/sealed-secrets/
            git commit -m "chore: update sealed secrets [skip ci]"
            git push origin main
          fi
