version: '3.8'

# ────────────────────────────────────────────────────────────────────────────
# MSA 구조: 각 서비스가 독립 이미지 → K8s Pod 분리 기반
#
# Phase 1-2 (활성):  db, redis, api, frontend
# Phase 3   (활성):  zookeeper, kafka,
#                    stock-collector, anomaly-detector,
#                    news-fetcher, ai-analyzer, notifier
# ────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ─────────────────────────────────────────────────────

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: stock_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock1234
      POSTGRES_DB: stockdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stockdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stock_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Phase 3: Kafka ───────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: stock_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: stock_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_MESSAGE_MAX_BYTES: 10485760          # 10MB (주가 배치 메시지 허용)
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Services (각 서비스 독립 이미지) ──────────────────────────────────

  api:
    build:
      context: .                        # 루트 컨텍스트 (core/ 공유 모듈 접근)
      dockerfile: services/api/Dockerfile
    image: stock-api:latest
    container_name: stock_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stock:stock1234@db:5432/stockdb
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      ANOMALY_THRESHOLD_PERCENT: ${ANOMALY_THRESHOLD_PERCENT:-8.0}
      ANOMALY_ZSCORE_THRESHOLD: ${ANOMALY_ZSCORE_THRESHOLD:-3.0}
      SCHEDULE_INTERVAL_MINUTES: ${SCHEDULE_INTERVAL_MINUTES:-60}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092   # Phase 3: analysis.completed 구독
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend             # 독립 컨텍스트 (Node.js 전용 이미지)
      dockerfile: Dockerfile
    image: stock-frontend:latest
    container_name: stock_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  # ── Phase 3: Kafka 파이프라인 서비스 ────────────────────────────────

  stock-collector:
    build:
      context: .
      dockerfile: services/stock-collector/Dockerfile
    image: stock-collector:latest
    container_name: stock_collector
    restart: "no"                       # K8s CronJob 방식 — 1회 실행 후 종료
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  anomaly-detector:
    build:
      context: .
      dockerfile: services/anomaly-detector/Dockerfile
    image: stock-anomaly-detector:latest
    container_name: stock_anomaly_detector
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANOMALY_THRESHOLD_PERCENT: ${ANOMALY_THRESHOLD_PERCENT:-8.0}
      ANOMALY_ZSCORE_THRESHOLD: ${ANOMALY_ZSCORE_THRESHOLD:-3.0}
    depends_on:
      kafka:
        condition: service_healthy

  news-fetcher:
    build:
      context: .
      dockerfile: services/news-fetcher/Dockerfile
    image: stock-news-fetcher:latest
    container_name: stock_news_fetcher
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NEWS_API_KEY: ${NEWS_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy

  ai-analyzer:
    build:
      context: .
      dockerfile: services/ai-analyzer/Dockerfile
    image: stock-ai-analyzer:latest
    container_name: stock_ai_analyzer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy

  notifier:
    build:
      context: .
      dockerfile: services/notifier/Dockerfile
    image: stock-notifier:latest
    container_name: stock_notifier
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      NOTIFY_SECTORS: ${NOTIFY_SECTORS:-}
      NOTIFY_EVENT_TYPES: ${NOTIFY_EVENT_TYPES:-INDIVIDUAL,SECTOR,MARKET}
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  db_data:
