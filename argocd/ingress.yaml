---
# ArgoCD UI Ingress
#
# 접속 방법:
#   1. /etc/hosts (또는 C:\Windows\System32\drivers\etc\hosts) 에 추가:
#        10.0.2.200  argocd.local
#   2. 브라우저에서 http://argocd.local 접속
#
# 초기 admin 비밀번호 확인:
#   kubectl -n argocd get secret argocd-initial-admin-secret \
#     -o jsonpath="{.data.password}" | base64 -d

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
