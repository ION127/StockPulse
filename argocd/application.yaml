apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stock-platform
  namespace: argocd
  labels:
    app.kubernetes.io/name: stock-platform
    app.kubernetes.io/managed-by: argocd
  # App 삭제 시 실제 리소스도 함께 삭제되도록 finalizer 설정
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/ION127/StockPulse.git
    targetRevision: main
    path: k8s/
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: stock

  syncPolicy:
    # 자동 동기화: Git 변경사항이 감지되면 자동으로 클러스터에 적용
    automated:
      prune: true      # Git에서 삭제된 리소스를 클러스터에서도 삭제
      selfHeal: true   # 클러스터 상태가 Git과 다르면 자동으로 복구

    syncOptions:
      - CreateNamespace=true     # 네임스페이스가 없으면 자동 생성
      - PrunePropagationPolicy=foreground  # 종속 리소스 먼저 삭제
      - PruneLast=true           # 동기화 완료 후 불필요 리소스 삭제
      - ServerSideApply=true     # kubectl apply annotation 262KB 제한 우회

    # 재시도 설정 (일시적 오류 처리)
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # StatefulSet volumeClaimTemplates에 Kubernetes가 자동 추가하는 필드 무시
  # (volumeMode, status 등 → 영구 OutOfSync 방지)
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: kafka
      namespace: stock
      jqPathExpressions:
        - .spec.volumeClaimTemplates[].spec.volumeMode
        - .spec.volumeClaimTemplates[].spec.storageClassName
        - .spec.volumeClaimTemplates[].status
    - group: apps
      kind: StatefulSet
      name: timescaledb
      namespace: stock
      jqPathExpressions:
        - .spec.volumeClaimTemplates[].spec.volumeMode
        - .spec.volumeClaimTemplates[].spec.storageClassName
        - .spec.volumeClaimTemplates[].status
    - group: apps
      kind: StatefulSet
      name: zookeeper
      namespace: stock
      jqPathExpressions:
        - .spec.volumeClaimTemplates[].spec.volumeMode
        - .spec.volumeClaimTemplates[].spec.storageClassName
        - .spec.volumeClaimTemplates[].status
    # CronJob: K8s가 자동으로 추가하는 lastScheduleTime, active 필드 무시
    - group: batch
      kind: CronJob
      namespace: stock
      jqPathExpressions:
        - .status.lastScheduleTime
        - .status.lastSuccessfulTime
        - .status.active
