---
# Sealed Secrets Controller — ArgoCD로 설치/관리
#
# Sealed Secrets는 시크릿을 클러스터 공개키로 암호화해서 Git에 커밋할 수 있게 해줍니다.
# 이 Application을 먼저 apply하면 컨트롤러가 설치되고,
# 이후 k8s/sealed-secrets/*.yaml을 stock-platform App이 자동 배포합니다.
#
# 적용:
#   kubectl apply -f argocd/sealed-secrets-controller.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: "2.16.1"
    helm:
      releaseName: sealed-secrets-controller
      parameters:
        # kubeseal CLI가 이 이름으로 컨트롤러를 찾음 — 변경 금지
        - name: fullnameOverride
          value: sealed-secrets-controller

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system   # 클러스터 전체 공개키 관리 → kube-system에 설치

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
